name: 📬 每日心语自动发送

on:
  schedule:
    - cron: '0 0,9 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [send-daily]

jobs:
  send:
    name: 发送每日心语
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 📧 发送每日心语
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: 每日心语
        run: npx tsx src/gh-send.ts
