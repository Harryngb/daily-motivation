name: 📬 每日心语自动发送

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send:
    name: 发送每日心语
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 检查环境变量
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
        run: |
          if [ -z "$BREVO_API_KEY" ]; then echo "❌ BREVO_API_KEY 未设置"; exit 1; fi
          if [ -z "$BREVO_SENDER_EMAIL" ]; then echo "❌ BREVO_SENDER_EMAIL 未设置"; exit 1; fi
          echo "✅ 环境变量检查通过"

      - name: 确保发送历史文件存在
        run: |
          mkdir -p data
          if [ ! -f data/sent_history.json ]; then echo '{}' > data/sent_history.json; fi

      - name: 📧 发送每日心语
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: 每日心语
        run: npx tsx src/gh-send.ts

      - name: 💾 保存发送历史
        if: always()
        run: |
          git config user.name "每日心语 Bot"
          git config user.email "bot@daily-motivation.com"
          git add data/sent_history.json
          if ! git diff --staged --quiet; then
            git commit -m "📝 更新发送历史 $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main || true
            git push
          else
            echo "📝 发送历史无变化，跳过提交"
          fi

      - name: ✅ 完成通知
        if: always()
        run: |
          echo "========================================"
          echo "  ✅ 每日心语发送任务完成"
          echo "  详情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "========================================"
