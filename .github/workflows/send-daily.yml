name: 📬 每日心语自动发送

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  send:
    name: 发送每日心语
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: ⏰ 检查是否到发送时间
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          case $HOUR in
            08|13|17) echo "✅ 时间到 ($HOUR:00)，开始发送" ;;
            *) echo "⏭️ 当前 $HOUR:00，不是发送时间，跳过" ; exit 0 ;;
          esac

      - name: 📧 发送每日心语
        if: success()
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: 每日心语
        run: npx tsx src/gh-send.ts
